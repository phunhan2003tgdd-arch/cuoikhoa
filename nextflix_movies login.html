<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>StreamFlix — Demo</title>
  <link rel="stylesheet" href="style.css">

  <style>
    :root{
      --bg:#0b0b0b; --card:#151515; --muted:#bfc7d1;
      --accent:#e50914;
      --glass: rgba(255,255,255,0.04);
    }
    *{box-sizing:border-box}
    
    /* Carousel */

  </style>

</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">StreamFlix</div>
      <nav>
        <a href="nextfilx_fix login.html">Home</a>
        <a href="#">Movies</a>
        <a href="nextflix_series login.html">Series</a>
        <a href="#">My List</a>
      </nav>
    </div>

    <div class="actions">
      <a href="netflix_login.html">
        <button class="btn" id="signin">Đăng xuất</button>
      </a>
        
    </div>
  </header>



  <main>
    <section>
      <div class="row-title">
        <h3>Movies on StreamFlix</h3>
        <div style="color:var(--muted);font-size:13px">Showing <span id="count">0</span> results</div>
      </div>

      <div id="grid" class="grid"></div>
    </section>
  </main>



  <!-- Modal -->
  <div id="overlay" class="overlay">
    <div class="modal">
      <div style="position:relative">
        <button id="closeModal" class="close">✕</button>
        <div class="inner">
          <img id="modalImg" src="" alt="cover" />
          <div class="info">
            <h2 id="modalTitle">Title</h2>
            <p id="modalOverview">Overview</p>
            <div style="margin-top:12px">
              <button class="btn" id="playBtn">Play Trailer</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Player -->
  <div id="player" class="player">
    <video id="videoPlayer" controls></video>
    <button id="closePlayer" class="close" style="position:fixed;right:30px;top:30px">✕</button>
  </div>
  <script src="./movies.js"></script>
</body>
</html>
